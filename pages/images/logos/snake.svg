<svg xmlns="http://www.w3.org/2000/svg" width="300" height="125" viewBox="0 0 300 125">
  <rect width="300" height="125" fill="#0a0a1a"/>
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="0" y1="25" x2="300" y2="25"/>
    <line x1="0" y1="50" x2="300" y2="50"/>
    <line x1="0" y1="75" x2="300" y2="75"/>
    <line x1="0" y1="100" x2="300" y2="100"/>
    <line x1="50" y1="0" x2="50" y2="125"/>
    <line x1="100" y1="0" x2="100" y2="125"/>
    <line x1="150" y1="0" x2="150" y2="125"/>
    <line x1="200" y1="0" x2="200" y2="125"/>
    <line x1="250" y1="0" x2="250" y2="125"/>
  </g>
  <!-- Snake body -->
  <rect x="60" y="55" width="20" height="20" rx="3" fill="#00e676" opacity="1" filter="url(#glow)"/>
  <rect x="85" y="55" width="20" height="20" rx="3" fill="#00e676" opacity="0.9"/>
  <rect x="110" y="55" width="20" height="20" rx="3" fill="#00e676" opacity="0.8"/>
  <rect x="110" y="30" width="20" height="20" rx="3" fill="#00e676" opacity="0.7"/>
  <rect x="135" y="30" width="20" height="20" rx="3" fill="#00e676" opacity="0.6"/>
  <rect x="160" y="30" width="20" height="20" rx="3" fill="#00e676" opacity="0.5"/>
  <rect x="185" y="30" width="20" height="20" rx="3" fill="#00e676" opacity="0.4"/>
  <!-- Food -->
  <circle cx="215" cy="65" r="9" fill="#ef5350" filter="url(#foodglow)"/>
  <!-- Glow filters -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="foodglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Label -->
  <text x="150" y="112" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#00e676" text-anchor="middle" letter-spacing="4" opacity="0.9">SNAKE</text>
</svg>
