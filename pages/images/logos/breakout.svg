<svg xmlns="http://www.w3.org/2000/svg" width="300" height="125" viewBox="0 0 300 125">
  <rect width="300" height="125" fill="#0a0a1a"/>
  <!-- Brick rows -->
  <!-- Row 1 - Red -->
  <rect x="10" y="12" width="50" height="14" rx="2" fill="#ef5350"/>
  <rect x="65" y="12" width="50" height="14" rx="2" fill="#ef5350"/>
  <rect x="120" y="12" width="50" height="14" rx="2" fill="#ef5350"/>
  <rect x="175" y="12" width="50" height="14" rx="2" fill="#ef5350"/>
  <rect x="230" y="12" width="50" height="14" rx="2" fill="#ef5350"/>
  <!-- Shine -->
  <rect x="10" y="12" width="50" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="65" y="12" width="50" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="120" y="12" width="50" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="175" y="12" width="50" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="230" y="12" width="50" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>

  <!-- Row 2 - Orange -->
  <rect x="10" y="30" width="50" height="14" rx="2" fill="#ff9800"/>
  <rect x="65" y="30" width="50" height="14" rx="2" fill="#ff9800"/>
  <rect x="120" y="30" width="50" height="14" rx="2" fill="#ff9800"/>
  <rect x="175" y="30" width="50" height="14" rx="2" fill="#ff9800"/>
  <rect x="230" y="30" width="50" height="14" rx="2" fill="#ff9800"/>
  <rect x="10" y="30" width="50" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="65" y="30" width="50" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="120" y="30" width="50" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="175" y="30" width="50" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="230" y="30" width="50" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>

  <!-- Row 3 - Yellow -->
  <rect x="10" y="48" width="50" height="14" rx="2" fill="#ffc107"/>
  <rect x="65" y="48" width="50" height="14" rx="2" fill="#ffc107"/>
  <rect x="175" y="48" width="50" height="14" rx="2" fill="#ffc107"/>
  <rect x="230" y="48" width="50" height="14" rx="2" fill="#ffc107"/>
  <!-- Missing brick (hit) -->
  <rect x="10" y="48" width="50" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="65" y="48" width="50" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="175" y="48" width="50" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="230" y="48" width="50" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>

  <!-- Ball -->
  <circle cx="139" cy="65" r="7" fill="white">
    <filter id="ballglow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </circle>

  <!-- Paddle -->
  <rect x="90" y="102" width="80" height="10" rx="5" fill="#00d4ff"/>

  <!-- Label -->
  <text x="150" y="120" font-family="Courier New, monospace" font-size="11" font-weight="bold" fill="#00d4ff" text-anchor="middle" letter-spacing="3" opacity="0.85">BREAKOUT</text>
</svg>
