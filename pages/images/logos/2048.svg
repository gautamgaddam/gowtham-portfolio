<svg xmlns="http://www.w3.org/2000/svg" width="300" height="125" viewBox="0 0 300 125">
  <rect width="300" height="125" fill="#faf8ef"/>
  <!-- Grid background -->
  <rect x="25" y="8" width="110" height="110" rx="6" fill="#bbada0"/>
  <!-- 4 tile grid -->
  <!-- Row 1 -->
  <rect x="30" y="13" width="47" height="47" rx="4" fill="#edc22e"/>
  <text x="53" y="42" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f9f6f2" text-anchor="middle">2048</text>
  <rect x="82" y="13" width="47" height="47" rx="4" fill="#edc850"/>
  <text x="105" y="42" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f9f6f2" text-anchor="middle">512</text>
  <!-- Row 2 -->
  <rect x="30" y="65" width="47" height="47" rx="4" fill="#f2b179"/>
  <text x="53" y="94" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f9f6f2" text-anchor="middle">8</text>
  <rect x="82" y="65" width="47" height="47" rx="4" fill="#f59563"/>
  <text x="105" y="94" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f9f6f2" text-anchor="middle">16</text>

  <!-- Score display -->
  <rect x="150" y="8" width="65" height="45" rx="6" fill="#bbada0"/>
  <text x="182" y="25" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#eee4da" text-anchor="middle" letter-spacing="1">SCORE</text>
  <text x="182" y="44" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">4096</text>

  <rect x="222" y="8" width="65" height="45" rx="6" fill="#bbada0"/>
  <text x="254" y="25" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#eee4da" text-anchor="middle" letter-spacing="1">BEST</text>
  <text x="254" y="44" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">8192</text>

  <!-- Label -->
  <text x="224" y="85" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#776e65" text-anchor="middle" opacity="0.9">2048</text>
  <text x="224" y="110" font-family="Arial, sans-serif" font-size="11" fill="#bbada0" text-anchor="middle">Join the numbers!</text>
</svg>
